<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>한국은행 경제연구원 업무보고</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="slides/tokens.css">
</head>
<body style="margin:0;background:#000;">
<deck-stage width="1920" height="1080">
  <section id="cover"></section>
  <section id="status"></section>
  <section id="priorities"></section>
  <section id="other"></section>
</deck-stage>

<script src="deck-stage.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="slides/Cover.jsx"></script>
<script type="text/babel" src="slides/SlideStatus.jsx"></script>
<script type="text/babel" src="slides/SlidePriorities.jsx"></script>
<script type="text/babel" src="slides/SlideOther.jsx"></script>

<script type="text/babel">
  const mount = (id, C) => ReactDOM.createRoot(document.getElementById(id)).render(<C />);
  setTimeout(() => {
    mount('cover', window.Cover);
    mount('status', window.SlideStatus);
    mount('priorities', window.SlidePriorities);
    mount('other', window.SlideOther);
  }, 50);
</script>
</body>
</html>
